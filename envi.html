<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:#111;
    color:#fff;
    overflow-x:hidden;
    position:relative;
}

/* STARS */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:#ff0000;
    border-radius:50%;
    opacity:0.7;
    animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
    0%{transform:scale(1);opacity:0.3;}
    50%{transform:scale(1.5);opacity:1;}
    100%{transform:scale(1);opacity:0.3;}
}

/* HEADER */
header{
    background:#000;
    padding:40px 20px;
    border-bottom:2px solid #ff0000;
    text-align:center;
}
header h1{
    font-family:'Orbitron',sans-serif;
    font-size:40px;
    color:#ff0000;
}

/* NAV */
nav{margin-top:20px;}

.nav-btn{
    position:relative;
    display:inline-block;
    margin:8px;
    padding:12px 24px;
    background:linear-gradient(135deg,#ff0000,#990000);
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    font-family:'Orbitron',sans-serif;
    box-shadow:0 0 10px #ff0000;
    overflow:hidden;
    transition:0.3s;
}

/* SHINE */
.nav-btn::after{
    content:'';
    position:absolute;
    top:0;
    left:-150%;
    width:50%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
    transform:skewX(-25deg);
    animation:shine 2s infinite;
}
@keyframes shine{
    0%{left:-150%;}
    100%{left:150%;}
}

.nav-btn:hover{
    background:#000;
    color:#ff0000;
    transform:translateY(-3px);
}

/* SECTION */
section{
    max-width:900px;
    margin:40px auto;
    padding:30px;
    background:rgba(255,0,0,0.08);
    border-radius:12px;
    box-shadow:0 0 20px #ff0000;
}

/* 🔥 2x2 GRID FIX */
.image-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin-top:20px;
}

.image-grid img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
    box-shadow:0 0 10px #ff0000;
    transition:0.3s;
}

.image-grid img:hover{
    transform:scale(1.05);
}

/* TEXT */
p{
    margin-top:20px;
    font-size:18px;
    line-height:1.8;
}

/* FOOTER */
footer{
    background:#000;
    padding:20px;
    text-align:center;
    border-top:2px solid #ff0000;
    margin-top:40px;
}
</style>
</head>

<body>

<script>
for(let i=0;i<50;i++){
    let star=document.createElement('div');
    star.className='star';
    star.style.top=Math.random()*100+'%';
    star.style.left=Math.random()*100+'%';
    document.body.appendChild(star);
}
</script>
