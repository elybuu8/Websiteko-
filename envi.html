
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elli's Website - Environment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:#111;
    color:#fff;
    overflow-x:hidden;
    text-align:center;
}

.star{
    position:absolute;
    background:#ff0000;
    border-radius:50%;
    opacity:.7;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    0%{transform:scale(1);opacity:.3;}
    50%{transform:scale(1.5);opacity:1;}
    100%{transform:scale(1);opacity:.3;}
}

header{
    background:#000;
    padding:50px 20px 20px;
    border-bottom:2px solid #ff0000;
}

header h1{
    font-family:'Orbitron',sans-serif;
    font-size:40px;
    color:#ff0000;
}

nav{margin-top:20px;}

.nav-btn{
    display:inline-block;
    margin:8px;
    padding:12px 28px;
    background:linear-gradient(135deg,#ff0000,#990000);
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    font-family:'Orbitron',sans-serif;
    box-shadow:0 0 5px #ff0000,0 0 10px #ff4d4d;
}

section{
    background:rgba(255,0,0,0.08);
    padding:50px 25px;
    margin:30px auto;
    max-width:500px;
    border-radius:12px;
    box-shadow:0 0 20px #ff0000;
}

.image-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.image-card{
    width:100%;
    aspect-ratio:1/1;
    position:relative;
    overflow:hidden;
    border-radius:12px;
    cursor:pointer;
}

.image-card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.4s;
}

.image-card:hover img{transform:scale(1.1);}

/* LIGHTBOX */
.lightbox{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:12px;
    box-shadow:0 0 30px #ff0000;
    transform:scale(.8);
    opacity:0;
    transition:.4s ease;
}

.lightbox.show img{
    transform:scale(1);
    opacity:1;
}

footer{
    background:#000;
    border-top:2px solid #ff0000;
    padding:20px;
    margin-top:40px;
    font-family:'Orbitron',sans-serif;
}

@media(max-width:600px){
    .image-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<script>
for(let i=0;i<50;i++){
    let star=document.createElement('div');
    star.className='star';
    star.style.top=Math.random()*100+'%';
    star.style.left=Math.random()*100+'%';
    let size=(Math.random()*3+1)+'px';
    star.style.width=size;
    star.style.height=size;
    document.body.appendChild(star);
}
</script>

<header>
<h1>My Environment</h1>
<nav>
<a href="index.html" class="nav-btn">Home</a>
<a href="about.html" class="nav-btn">About Me</a>
<a href="contacts.html" class="nav-btn">Contacts</a>
<a href="goals.html" class="nav-btn">My Goals</a>
<a href="envi.html" class="nav-btn">Environment</a>
<a href="future.html" class="nav-btn">Future Me</a>
<a href="street.html" class="nav-btn">Street Photography</a>
<a href="brand.html" class="nav-btn">My brand, My logo</a>
<a href="thankyou.html" class="nav-btn">Thank You</a>
</nav>
</header>

<section>
<div class="image-grid">
    <div class="image-card"><img src="img1.jpg"></div>
    <div class="image-card"><img src="img2.jpg"></div>
    <div class="image-card"><img src="img3.jpg"></div>
    <div class="image-card"><img src="img4.jpg"></div>
</div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<footer>
© 2026 Elli's Website
</footer>

<script>
const lightbox=document.getElementById('lightbox');
const lightboxImg=document.getElementById('lightbox-img');
const cards=document.querySelectorAll('.image-card img');
let currentIndex=0;

cards.forEach((img,index)=>{
    img.addEventListener('click',()=>{
        currentIndex=index;
        lightbox.style.display='flex';
        setTimeout(()=> lightbox.classList.add('show'),10);
        lightboxImg.src=img.src;
    });
});

lightbox.addEventListener('click',()=>{
    lightbox.classList.remove('show');
    setTimeout(()=> lightbox.style.display='none',300);
});

window.addEventListener('keydown',(e)=>{
    if(lightbox.style.display==='flex'){
        if(e.key==='ArrowRight'){
            currentIndex=(currentIndex+1)%cards.length;
            lightboxImg.src=cards[currentIndex].src;
        }
        if(e.key==='ArrowLeft'){
            currentIndex=(currentIndex-1+cards.length)%cards.length;
            lightboxImg.src=cards[currentIndex].src;
        }
        if(e.key==='Escape'){
            lightbox.classList.remove('show');
            setTimeout(()=> lightbox.style.display='none',300);
        }
    }
});
</script>

</body>
</html>
